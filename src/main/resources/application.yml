server:
  port: 8080

spring:
  application:
    name: order-flow-service
  datasource:
    url: jdbc:h2:mem:orderflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

orderflow:
  jobs:
    invoice:
      output-dir: ./invoices
    refund:
      payment-gateway-base-url: http://localhost:8080

